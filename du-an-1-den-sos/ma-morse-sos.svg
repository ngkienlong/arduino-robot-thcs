<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" font-family="Arial, sans-serif">
  <!-- Nền -->
  <rect width="800" height="300" fill="#f8f9fa" rx="12"/>
  
  <!-- Tiêu đề -->
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#2c3e50">📡 Tín hiệu SOS bằng mã Morse</text>

  <!-- Timeline -->
  <line x1="50" y1="150" x2="750" y2="150" stroke="#bdc3c7" stroke-width="2"/>
  
  <!-- Chữ S: 3 chấm -->
  <g>
    <text x="145" y="80" text-anchor="middle" font-size="18" font-weight="bold" fill="#3498db">S</text>
    <text x="145" y="100" text-anchor="middle" font-size="12" fill="#555">· · ·</text>
    
    <!-- Chấm 1 -->
    <rect x="80" y="125" width="30" height="50" rx="6" fill="#f39c12">
      <animate attributeName="opacity" values="1;0.3;1" dur="3s" repeatCount="indefinite"/>
    </rect>
    <!-- Khoảng cách -->
    <!-- Chấm 2 -->
    <rect x="120" y="125" width="30" height="50" rx="6" fill="#f39c12">
      <animate attributeName="opacity" values="1;0.3;1" dur="3s" repeatCount="indefinite" begin="0.4s"/>
    </rect>
    <!-- Chấm 3 -->
    <rect x="160" y="125" width="30" height="50" rx="6" fill="#f39c12">
      <animate attributeName="opacity" values="1;0.3;1" dur="3s" repeatCount="indefinite" begin="0.8s"/>
    </rect>
  </g>

  <!-- Khoảng cách giữa chữ -->
  <text x="225" y="155" text-anchor="middle" font-size="20" fill="#bdc3c7">⋯</text>

  <!-- Chữ O: 3 gạch -->
  <g>
    <text x="400" y="80" text-anchor="middle" font-size="18" font-weight="bold" fill="#e74c3c">O</text>
    <text x="400" y="100" text-anchor="middle" font-size="12" fill="#555">— — —</text>
    
    <!-- Gạch 1 -->
    <rect x="270" y="125" width="70" height="50" rx="6" fill="#e74c3c">
      <animate attributeName="opacity" values="1;0.3;1" dur="3s" repeatCount="indefinite" begin="1.2s"/>
    </rect>
    <!-- Gạch 2 -->
    <rect x="350" y="125" width="70" height="50" rx="6" fill="#e74c3c">
      <animate attributeName="opacity" values="1;0.3;1" dur="3s" repeatCount="indefinite" begin="1.6s"/>
    </rect>
    <!-- Gạch 3 -->
    <rect x="430" y="125" width="70" height="50" rx="6" fill="#e74c3c">
      <animate attributeName="opacity" values="1;0.3;1" dur="3s" repeatCount="indefinite" begin="2s"/>
    </rect>
  </g>

  <!-- Khoảng cách giữa chữ -->
  <text x="535" y="155" text-anchor="middle" font-size="20" fill="#bdc3c7">⋯</text>

  <!-- Chữ S: 3 chấm -->
  <g>
    <text x="645" y="80" text-anchor="middle" font-size="18" font-weight="bold" fill="#3498db">S</text>
    <text x="645" y="100" text-anchor="middle" font-size="12" fill="#555">· · ·</text>
    
    <!-- Chấm 1 -->
    <rect x="580" y="125" width="30" height="50" rx="6" fill="#f39c12">
      <animate attributeName="opacity" values="1;0.3;1" dur="3s" repeatCount="indefinite" begin="2.4s"/>
    </rect>
    <!-- Chấm 2 -->
    <rect x="620" y="125" width="30" height="50" rx="6" fill="#f39c12">
      <animate attributeName="opacity" values="1;0.3;1" dur="3s" repeatCount="indefinite" begin="2.6s"/>
    </rect>
    <!-- Chấm 3 -->
    <rect x="660" y="125" width="30" height="50" rx="6" fill="#f39c12">
      <animate attributeName="opacity" values="1;0.3;1" dur="3s" repeatCount="indefinite" begin="2.8s"/>
    </rect>
  </g>

  <!-- Chú thích -->
  <g transform="translate(50, 210)">
    <rect x="0" y="0" width="700" height="70" rx="8" fill="white" stroke="#bdc3c7" stroke-width="1.5"/>
    <text x="20" y="22" font-size="13" fill="#2c3e50" font-weight="bold">📏 Quy tắc thời gian:</text>
    <rect x="20" y="32" width="30" height="14" rx="3" fill="#f39c12"/>
    <text x="58" y="44" font-size="11" fill="#555">Chấm = 200ms</text>
    <rect x="170" y="32" width="70" height="14" rx="3" fill="#e74c3c"/>
    <text x="248" y="44" font-size="11" fill="#555">Gạch = 600ms (3× chấm)</text>
    <text x="440" y="44" font-size="11" fill="#555">Giữa tín hiệu = 200ms</text>
    <text x="640" y="44" font-size="11" fill="#555">Giữa chữ = 600ms</text>
    <text x="350" y="62" font-size="12" fill="#2c3e50" font-weight="bold">Sau SOS nghỉ 1400ms (7× chấm) rồi lặp lại</text>
  </g>
</svg>